<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | chatNut</title>
  <link rel="stylesheet" href="signup.css">
</head>

<body>
  <section class="signup-hero">
    <h1>Welcome Back</h1>
    <p>Login to start chatting.</p>

    <div class="signup-wrapper">
      <div id="error-container" class="error-msg">
        Invalid email or password. Please try again.
      </div>

      <form class="signup-form" id="auth-form" action="/login" method="POST">
        <div class="input-card">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="input-card">
          <label for="password">Password</label>
          <div class="password-field"> <input type="password" id="password" name="password" required>
            <i class="fa-solid fa-eye" id="togglePassword"></i>
          </div>
        </div>

        <button type="submit" id="auth-btn" class="signup-btn login-style">
          <span class="loader"></span>
          <span class="btn-text">Login</span>
        </button>

        <p class="login-text">Don't have an account? <a href="signup.html">Sign Up</a></p>
      </form>
    </div>
  </section>

  <script src="login.js">
  
  </script>
</body>

</html>
